version: '3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www
      - letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=localhost
      - APP_ENV=local
      - APP_DEBUG=true

volumes:
  letsencrypt:
