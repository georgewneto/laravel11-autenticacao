version: '3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www
      - letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=seu-dominio.com
    command: >
      bash -c "
        /var/www/generate-cert.sh $$APP_DOMAIN &&
        php artisan serve --host=0.0.0.0 --port=80
      "

volumes:
  letsencrypt:
